<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
    <script defer type="module" src="./app.js"></script>
</head>

<body>
    <div class="wrapper">
        <!-- Header -->
        <header>
            <div id="logo">
                <img src="./images/logo.svg" alt="Logo">
            </div>
            <div id="score-card">
                <span id="heading">SCORE</span>
                <h1 id="score">
                    0
                </h1>
            </div>
        </header>

        <div class="inner-wrapper">
            <!-- User Choice -->
            <div id="options-container">
                <div id="user-input">
                    <!-- Paper -->
                    <div data-choice="paper" class="option paper user-input">
                        <div class="btn">
                            <img src="./images/icon-paper.svg" alt="Paper">
                        </div>
                    </div>
                    <!-- Scissor -->
                    <div data-choice="scissors" class="option scissors user-input">
                        <div class="btn">
                            <img src="./images/icon-scissors.svg" alt="Scissor">
                        </div>
                    </div>
                    <!-- Rock -->
                    <div data-choice="rock" class="option rock user-input">
                        <div class="btn">
                            <img src="./images/icon-rock.svg" alt="Rock">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Winner Section -->
            <div id="winner-container" class="hidden">
                <div class="winner-section">
                    <!-- User Pick -->
                    <div class="choice">
                        <h2>You Picked</h2>
                        <div id="user-choice" class="option">
                            <div class="btn">
                                <img src="" alt="User Choice">
                            </div>
                        </div>
                    </div>
                    <!-- Result Status -->
                    <div id="result-status" class="hidden">
                        <h2 id="result">You Win</h2>
                        <button id="play-again">
                            Play again
                        </button>
                    </div>
                    <!-- House Picking -->
                    <div class="choice">
                        <h2>The House Picked</h2>
                        <div id="house-choice" class="option processing">
                            <div class="btn">
                                <img src="" alt="House Choice">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
